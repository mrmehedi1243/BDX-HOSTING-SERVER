kind = "web"
previewPath = "/"
title = "BDX Hosting Panel"
version = "1.0.0"
id = "artifacts/hosting-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24610

[services.development]
run = "pnpm --filter @workspace/hosting-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hosting-panel", "run", "build" ]
publicDir = "artifacts/hosting-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24610"
BASE_PATH = "/"
