kind = "web"
  previewPath = "/python-panel"
  title = "BDX Python Panel"
  version = "1.0.0"
  id = "artifacts/bdx-python"

  [[services]]
  name = "web"
  paths = ["/python-panel"]
  localPort = 5000

  [services.development]
  run = "cd /home/runner/workspace/artifacts/bdx-python && python main.py"

  [services.env]
  PORT = "5000"
  BASE_PATH = "/python-panel"
  