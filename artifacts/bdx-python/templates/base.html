<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}BDX Hosting{% endblock %}</title>
  <link rel="stylesheet" href="{{ base }}/static/style.css" />
</head>
<body>
<div class="shell" id="shell">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon" style="flex-shrink:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
      </div>
      <span class="logo-text" id="logo-text">BDX Hosting</span>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar" onclick="toggleSidebar()">
        <svg id="toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>

    <nav>
      <div>
        <div class="nav-section-label" id="lbl-platform">Platform</div>
        <div class="nav-links">
          <a href="{{ base }}/" class="nav-link {% if active == 'dashboard' %}active{% endif %}" data-tip="Dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span class="nav-label">Dashboard</span>
          </a>
          <a href="{{ base }}/servers" class="nav-link {% if active == 'servers' %}active{% endif %}" data-tip="My Servers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>
            <span class="nav-label">My Servers</span>
          </a>
        </div>
      </div>
      <div>
        <div class="nav-section-label" id="lbl-admin">Admin</div>
        <div class="nav-links">
          <a href="{{ base }}/admin/plans" class="nav-link {% if active == 'plans' %}active{% endif %}" data-tip="Plans">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
            <span class="nav-label">Plans</span>
          </a>
          <a href="{{ base }}/admin/users" class="nav-link {% if active == 'users' %}active{% endif %}" data-tip="Users">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            <span class="nav-label">Users</span>
          </a>
          <a href="{{ base }}/admin/servers" class="nav-link {% if active == 'allservers' %}active{% endif %}" data-tip="All Servers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><line x1="22" y1="12" x2="2" y2="12"></line><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path><line x1="6" y1="16" x2="6.01" y2="16"></line><line x1="10" y1="16" x2="10.01" y2="16"></line></svg>
            <span class="nav-label">All Servers</span>
          </a>
        </div>
      </div>
    </nav>

    <div class="plan-widget" id="plan-widget-wrap">
      <div class="plan-card" id="plan-widget">
        <div class="plan-card-top">
          <div class="plan-name-row"><div class="plan-dot"></div><span id="pw-name">—</span></div>
          <span class="plan-price" id="pw-price"></span>
        </div>
        <div class="plan-bar-row">
          <div class="plan-bar-labels"><span>Slots</span><span id="pw-slots">—</span></div>
          <div class="bar-track"><div class="bar-fill" id="pw-bar" style="width:0%"></div></div>
        </div>
        <div class="plan-footer"><span id="pw-user">—</span><span id="pw-role">—</span></div>
      </div>
    </div>

    <!-- Collapsed plan dot (icon-only mode) -->
    <div class="plan-widget-mini" id="plan-widget-mini" style="display:none">
      <div class="plan-dot" style="margin:0 auto"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-inner">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<!-- Tooltip -->
<div id="sidebar-tip"></div>

<div id="toast"></div>

<script>
const BASE = "{{ base }}";
const CURRENT_USER_ID = 2;

/* ── Sidebar toggle ─────────────────────────────── */
let collapsed = localStorage.getItem('sidebar-collapsed') === '1';

function applySidebar(animate) {
  const shell = document.getElementById('shell');
  const sidebar = document.getElementById('sidebar');
  const logoText = document.getElementById('logo-text');
  const labels = document.querySelectorAll('.nav-label');
  const sectionLabels = document.querySelectorAll('.nav-section-label');
  const pw = document.getElementById('plan-widget-wrap');
  const pwMini = document.getElementById('plan-widget-mini');

  if (!animate) sidebar.style.transition = 'none';

  if (collapsed) {
    shell.classList.add('sidebar-collapsed');
    sidebar.classList.add('collapsed');
    logoText.style.opacity = '0';
    logoText.style.width = '0';
    logoText.style.overflow = 'hidden';
    labels.forEach(l => { l.style.opacity = '0'; l.style.width = '0'; l.style.overflow = 'hidden'; });
    sectionLabels.forEach(l => l.style.opacity = '0');
    pw.style.display = 'none';
    pwMini.style.display = 'flex';
  } else {
    shell.classList.remove('sidebar-collapsed');
    sidebar.classList.remove('collapsed');
    logoText.style.opacity = '1';
    logoText.style.width = '';
    logoText.style.overflow = '';
    labels.forEach(l => { l.style.opacity = '1'; l.style.width = ''; l.style.overflow = ''; });
    sectionLabels.forEach(l => l.style.opacity = '1');
    pw.style.display = '';
    pwMini.style.display = 'none';
  }

  if (!animate) {
    // Force reflow then restore transition
    sidebar.getBoundingClientRect();
    sidebar.style.transition = '';
  }
}

function toggleSidebar() {
  collapsed = !collapsed;
  localStorage.setItem('sidebar-collapsed', collapsed ? '1' : '0');
  applySidebar(true);
}

// Apply on load without animation
applySidebar(false);

/* ── Tooltip for collapsed nav links ────────────── */
const tip = document.getElementById('sidebar-tip');
document.querySelectorAll('.nav-link[data-tip]').forEach(el => {
  el.addEventListener('mouseenter', e => {
    if (!collapsed) return;
    tip.textContent = el.dataset.tip;
    const r = el.getBoundingClientRect();
    tip.style.top = (r.top + r.height / 2 - 14) + 'px';
    tip.style.left = (r.right + 8) + 'px';
    tip.classList.add('show');
  });
  el.addEventListener('mouseleave', () => tip.classList.remove('show'));
});

/* ── Toast ─────────────────────────────────────── */
function toast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

/* ── Fetch helper ──────────────────────────────── */
async function api(path, opts = {}) {
  const res = await fetch(BASE + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || 'Request failed');
  }
  return res.json();
}

/* ── Plan widget ───────────────────────────────── */
async function loadPlanWidget() {
  try {
    const u = await api(`/api/users/${CURRENT_USER_ID}`);
    document.getElementById('pw-name').textContent = u.plan_name || 'No Plan';
    document.getElementById('pw-price').textContent = u.plan_name ? `$${u.price_per_month}/mo` : '';
    const max = u.max_slots || 0;
    const used = u.slots_used || 0;
    document.getElementById('pw-slots').textContent = `${used} / ${max}`;
    document.getElementById('pw-bar').style.width = max > 0 ? `${(used/max)*100}%` : '0%';
    document.getElementById('pw-user').textContent = u.username || '';
    document.getElementById('pw-role').textContent = u.role || '';
  } catch(e) {}
}
loadPlanWidget();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
