{% extends "base.html" %}
{% block title %}My Servers — BDX Hosting{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">My Servers</h1>
  <p class="page-sub">Manage your deployed server slots.</p>
</div>

<div id="servers-grid" class="server-grid"></div>
<div id="servers-empty" class="empty-state" style="display:none">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="8" rx="2"></rect><rect x="2" y="14" width="20" height="8" rx="2"></rect></svg>
  <p>No servers deployed</p>
  <span style="font-size:12px;color:var(--text3)">You don't have any server slots yet.</span>
</div>
{% endblock %}

{% block scripts %}
<script>
function statusPill(s) {
  return `<span class="status-pill ${s}">${s}</span>`;
}
function pulseDot(s) {
  return `<div class="pulse-dot ${s}"></div>`;
}
function formatUptime(sec) {
  if (!sec) return '—';
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function miniBarColor(val, type) {
  if (type === 'cpu') return val > 80 ? 'danger' : val > 50 ? 'warn' : '';
  return '';
}

function serverCard(s) {
  const isRunning = s.status === 'running';
  const ramPct = Math.min(100, (s.ram_used_mb / 512) * 100);
  const cpuPct = Math.min(100, s.cpu_used);
  return `
  <div class="server-card" data-id="${s.id}">
    <div class="server-card-top">
      <div>
        <div class="server-name-row">${pulseDot(s.status)}<span class="server-name">${s.name}</span></div>
        <div class="server-uptime">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          ${formatUptime(s.uptime)}
        </div>
      </div>
      ${statusPill(s.status)}
    </div>
    <div class="server-resources">
      <div class="resource-row">
        <div class="resource-top">
          <span class="resource-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="12" x2="2" y2="12"></line><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
            RAM
          </span>
          <span class="resource-val">${s.ram_used_mb} MB</span>
        </div>
        <div class="mini-bar"><div class="mini-bar-fill" style="width:${ramPct}%"></div></div>
      </div>
      <div class="resource-row">
        <div class="resource-top">
          <span class="resource-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect></svg>
            CPU
          </span>
          <span class="resource-val">${s.cpu_used}%</span>
        </div>
        <div class="mini-bar"><div class="mini-bar-fill ${miniBarColor(cpuPct,'cpu')}" style="width:${cpuPct}%"></div></div>
      </div>
    </div>
    <div class="server-actions">
      ${isRunning
        ? `<button class="btn btn-stop" onclick="changeStatus(${s.id},'stopped',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>Stop</button>`
        : `<button class="btn btn-start" onclick="changeStatus(${s.id},'running',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>Start</button>`
      }
      <a href="${BASE}/console/${s.id}" class="btn btn-console">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        Console
      </a>
    </div>
  </div>`;
}

async function loadServers() {
  const grid = document.getElementById('servers-grid');
  const empty = document.getElementById('servers-empty');
  grid.innerHTML = `
    ${[1,2,3].map(() => `
      <div class="server-card">
        <div class="skel" style="height:16px;width:60%"></div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
          <div class="skel" style="height:3px;width:100%"></div>
          <div class="skel" style="height:3px;width:100%"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <div class="skel" style="height:32px;flex:1"></div>
          <div class="skel" style="height:32px;flex:1"></div>
        </div>
      </div>`).join('')}`;
  try {
    const servers = await api(`/api/servers?userId=${CURRENT_USER_ID}`);
    if (servers.length === 0) { grid.style.display = 'none'; empty.style.display = 'flex'; return; }
    grid.innerHTML = servers.map(serverCard).join('');
  } catch(e) { toast('Failed to load servers'); }
}

async function changeStatus(id, newStatus, btn) {
  btn.disabled = true;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> ...`;
  try {
    await api(`/api/servers/${id}/status`, { method: 'PUT', body: { status: newStatus } });
    toast(newStatus === 'running' ? 'Server started' : 'Server stopped');
    loadServers();
  } catch(e) { toast('Failed: ' + e.message); loadServers(); }
}

loadServers();

// Refresh every 30s
setInterval(loadServers, 30000);
</script>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
{% endblock %}
