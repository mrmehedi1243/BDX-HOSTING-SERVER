<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — BDX Hosting</title>
  <link rel="stylesheet" href="{{ base }}/static/style.css" />
  <style>
    .auth-shell { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg); padding:24px; }
    .auth-card { width:100%; max-width:380px; }
    .auth-logo { display:flex; align-items:center; gap:10px; margin-bottom:32px; }
    .auth-logo-icon { width:32px; height:32px; border-radius:7px; background:var(--violet); display:flex; align-items:center; justify-content:center; box-shadow:0 0 16px rgba(124,58,237,.4); }
    .auth-logo-text { font-size:17px; font-weight:600; letter-spacing:-.3px; }
    .auth-heading { font-size:22px; font-weight:600; margin-bottom:4px; }
    .auth-sub { font-size:13px; color:var(--text3); margin-bottom:28px; }
    .auth-form { display:flex; flex-direction:column; gap:14px; }
    .auth-form .form-group label { font-size:12px; color:var(--text3); margin-bottom:5px; display:block; }
    .auth-form input {
      background:#0d0d0d; border:1px solid var(--border);
      color:var(--text); border-radius:var(--radius); padding:0 12px; height:40px;
      font-size:13px; width:100%; outline:none; transition:border-color .12s, box-shadow .12s;
    }
    .auth-form input:focus { border-color:var(--violet); box-shadow:0 0 0 3px rgba(124,58,237,.1); }
    .auth-submit {
      height:40px; border-radius:var(--radius); background:var(--violet); color:#fff;
      font-size:13px; font-weight:500; width:100%; cursor:pointer; border:none;
      margin-top:4px; transition:background .12s, box-shadow .12s;
      box-shadow:0 0 0 0 rgba(124,58,237,0);
    }
    .auth-submit:hover { background:var(--violet-l); box-shadow:0 0 16px rgba(124,58,237,.3); }
    .auth-footer { text-align:center; margin-top:20px; font-size:12px; color:var(--text3); }
    .auth-footer a { color:var(--violet-l); }
    .auth-error { background:var(--red-bg); border:1px solid rgba(239,68,68,.15); color:var(--red); padding:10px 14px; border-radius:var(--radius); font-size:12px; }
    .auth-divider { display:flex; align-items:center; gap:12px; color:var(--text3); font-size:11px; margin:8px 0; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .tg-btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      height:40px; border-radius:var(--radius); border:1px solid #1a6fa8;
      background:rgba(26,111,168,.08); color:#5ab3e8;
      font-size:13px; font-weight:500; width:100%; cursor:pointer;
      text-decoration:none; transition:background .12s;
    }
    .tg-btn:hover { background:rgba(26,111,168,.16); }
  </style>
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
      </div>
      <span class="auth-logo-text">BDX Hosting</span>
    </div>

    <h1 class="auth-heading">Welcome back</h1>
    <p class="auth-sub">Sign in to your hosting account</p>

    {% if error %}
    <div class="auth-error" style="margin-bottom:16px">{{ error }}</div>
    {% endif %}

    <form class="auth-form" method="POST" action="{{ base }}/login">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="auth-submit">Sign in</button>
    </form>

    <div class="auth-divider">or</div>

    <a href="https://t.me/proxaura" target="_blank" class="tg-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/></svg>
      Buy Server via Telegram
    </a>

    <p class="auth-footer">Don't have an account? <a href="{{ base }}/signup">Create one</a></p>
  </div>
</div>
</body>
</html>
