{% extends "base.html" %}
{% block title %}Plans — BDX Hosting{% endblock %}

{% block content %}
<div class="page-header-row">
  <div>
    <h1 class="page-title">Hosting Plans</h1>
    <p class="page-sub">Manage available plans and resource allocations.</p>
  </div>
  <button class="btn btn-primary" onclick="openCreate()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    New Plan
  </button>
</div>

<div class="plan-grid" id="plans-grid"></div>

<!-- Create/Edit modal -->
<div class="modal-overlay" id="plan-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Create Plan</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Plan Name</label>
        <input type="text" id="f-name" placeholder="Pro" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price / month ($)</label>
          <input type="number" id="f-price" value="0" />
        </div>
        <div class="form-group">
          <label>Max Slots</label>
          <input type="number" id="f-slots" value="1" />
        </div>
        <div class="form-group">
          <label>RAM (MB)</label>
          <input type="number" id="f-ram" value="512" />
        </div>
        <div class="form-group">
          <label>CPU Limit (%)</label>
          <input type="number" id="f-cpu" value="25" />
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="f-desc" placeholder="Short description..." />
      </div>
    </div>
    <div class="modal-actions" style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" id="modal-submit" onclick="submitPlan()">Create</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let editId = null;

const specIcon = {
  slots: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"></rect><rect x="2" y="14" width="20" height="8" rx="2"></rect></svg>`,
  ram: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="12" x2="2" y2="12"></line><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>`,
  cpu: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect></svg>`,
};

function planCard(p) {
  return `
  <div class="plan-card-big">
    <div class="plan-top">
      <div>
        <div class="plan-label">Plan</div>
        <div class="plan-title">${p.name}</div>
        ${p.description ? `<div class="plan-desc">${p.description}</div>` : ''}
      </div>
      <div class="plan-price-big">
        <div class="plan-price-num">$${p.price_per_month}</div>
        <div class="plan-price-unit">/mo</div>
      </div>
    </div>
    <div class="plan-specs">
      <div class="plan-spec" style="color:#8b5cf6">${specIcon.slots} ${p.max_slots} server slot${p.max_slots!==1?'s':''}</div>
      <div class="plan-spec" style="color:#60a5fa">${specIcon.ram} ${(p.ram_mb/1024).toFixed(1)} GB RAM per slot</div>
      <div class="plan-spec" style="color:#06b6d4">${specIcon.cpu} ${p.cpu_percent}% CPU limit</div>
    </div>
    <div class="plan-actions">
      <button class="btn btn-edit" style="flex:1" onclick='openEdit(${JSON.stringify(p)})'>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        Edit
      </button>
      <button class="btn btn-danger btn-icon" onclick="deletePlan(${p.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>
      </button>
    </div>
  </div>`;
}

async function loadPlans() {
  const grid = document.getElementById('plans-grid');
  grid.innerHTML = `<div class="plan-card-big"><div class="skel" style="height:16px;width:50%;margin-bottom:8px"></div><div class="skel" style="height:28px;width:60%"></div></div>`.repeat(3);
  try {
    const plans = await api('/api/plans');
    grid.innerHTML = plans.map(planCard).join('');
  } catch(e) { toast('Failed to load plans'); }
}

function openCreate() {
  editId = null;
  document.getElementById('modal-title').textContent = 'Create Plan';
  document.getElementById('modal-submit').textContent = 'Create';
  ['f-name','f-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-price').value = 0;
  document.getElementById('f-slots').value = 1;
  document.getElementById('f-ram').value = 512;
  document.getElementById('f-cpu').value = 25;
  document.getElementById('plan-modal').classList.add('show');
}

function openEdit(p) {
  editId = p.id;
  document.getElementById('modal-title').textContent = 'Edit Plan';
  document.getElementById('modal-submit').textContent = 'Save';
  document.getElementById('f-name').value = p.name;
  document.getElementById('f-price').value = p.price_per_month;
  document.getElementById('f-slots').value = p.max_slots;
  document.getElementById('f-ram').value = p.ram_mb;
  document.getElementById('f-cpu').value = p.cpu_percent;
  document.getElementById('f-desc').value = p.description || '';
  document.getElementById('plan-modal').classList.add('show');
}

function closeModal() { document.getElementById('plan-modal').classList.remove('show'); }

async function submitPlan() {
  const body = {
    name: document.getElementById('f-name').value.trim(),
    maxSlots: +document.getElementById('f-slots').value,
    pricePerMonth: +document.getElementById('f-price').value,
    ramMB: +document.getElementById('f-ram').value,
    cpuPercent: +document.getElementById('f-cpu').value,
    description: document.getElementById('f-desc').value,
  };
  if (!body.name) return;
  try {
    if (editId) {
      await api(`/api/plans/${editId}`, { method: 'PUT', body });
      toast('Plan updated');
    } else {
      await api('/api/plans', { method: 'POST', body });
      toast('Plan created');
    }
    closeModal(); loadPlans();
  } catch(e) { toast('Failed: ' + e.message); }
}

async function deletePlan(id) {
  if (!confirm('Delete this plan?')) return;
  try { await api(`/api/plans/${id}`, { method: 'DELETE' }); toast('Plan deleted'); loadPlans(); }
  catch(e) { toast('Failed: ' + e.message); }
}

document.getElementById('plan-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
loadPlans();
</script>
{% endblock %}
