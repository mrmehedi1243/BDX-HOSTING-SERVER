{% extends "base.html" %}
{% block title %}Users — BDX Hosting{% endblock %}

{% block content %}
<div class="page-header-row" style="margin-bottom:20px">
  <div>
    <h1 class="page-title">Users</h1>
    <p class="page-sub">Manage accounts, assign packages, set expiry, and change roles.</p>
  </div>
  <div class="log-search-wrap" style="width:210px">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input class="log-search" type="text" id="user-search" placeholder="Search users…" oninput="filterUsers()" />
  </div>
</div>

<!-- Plan distribution -->
<div class="pkg-summary" id="pkg-summary" style="margin-bottom:18px"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Package</th>
        <th>Expiry</th>
        <th>Usage</th>
        <th>Role</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="users-body">
      <tr><td colspan="6" class="tbl-loading">Loading…</td></tr>
    </tbody>
  </table>
</div>

<!-- Edit user modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal" style="width:480px">
    <div class="modal-title" style="display:flex;align-items:center;gap:8px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--violet-l)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
      Edit User
    </div>

    <!-- User info card -->
    <div class="um-card">
      <div class="user-avatar um-avatar" id="um-avatar">?</div>
      <div style="flex:1;min-width:0">
        <div id="um-name" style="font-size:14px;font-weight:600"></div>
        <div id="um-email" style="font-size:11px;color:var(--text3);margin-top:1px"></div>
        <div id="um-joined" style="font-size:10px;color:var(--text3);margin-top:2px"></div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div id="um-srv-count" style="font-size:22px;font-weight:700;line-height:1;color:var(--text)">0</div>
        <div style="font-size:10px;color:var(--text3)">servers</div>
      </div>
    </div>

    <!-- Package picker -->
    <div class="form-group" style="margin-bottom:14px">
      <label style="font-size:11px;color:var(--text3);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em;font-weight:600">Assign Package</label>
      <div class="pkg-picker" id="um-plan-picker"></div>
    </div>

    <!-- Expiry date -->
    <div class="form-group" style="margin-bottom:14px" id="expiry-row">
      <label style="font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em;font-weight:600">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        Plan Expires
        <span id="expiry-auto-label" style="font-size:10px;color:var(--violet-l);font-weight:400;text-transform:none;letter-spacing:0"></span>
      </label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="datetime-local" id="um-expires" style="flex:1" />
        <button class="btn btn-ghost" style="height:34px;padding:0 10px;font-size:11px" onclick="clearExpiry()">Clear</button>
        <button class="btn btn-ghost" style="height:34px;padding:0 10px;font-size:11px" onclick="setExpiryDays(7)">+7d</button>
        <button class="btn btn-ghost" style="height:34px;padding:0 10px;font-size:11px" onclick="setExpiryDays(30)">+30d</button>
      </div>
      <div id="expiry-status" style="font-size:11px;margin-top:5px"></div>
    </div>

    <!-- Role -->
    <div class="form-group" style="margin-bottom:0">
      <label style="font-size:11px;color:var(--text3);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em;font-weight:600">Role</label>
      <div style="display:flex;gap:8px">
        <label class="role-radio" style="flex:1">
          <input type="radio" name="um-role" value="user">
          <span class="role-radio-label">
            <span class="role-badge user">user</span>
            <span style="font-size:11px;color:var(--text3);margin-top:2px">Standard access</span>
          </span>
        </label>
        <label class="role-radio" style="flex:1">
          <input type="radio" name="um-role" value="admin">
          <span class="role-radio-label">
            <span class="role-badge admin">admin</span>
            <span style="font-size:11px;color:var(--text3);margin-top:2px">Full admin access</span>
          </span>
        </label>
      </div>
    </div>

    <div class="modal-actions" style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeUserModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" id="um-save-btn" onclick="saveUser()">Save Changes</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let editUserId = null;
let allPlans = [];
let allUsers = [];

async function loadPlans() {
  try { allPlans = await api('/api/plans'); } catch(e) {}
}

function fmtDate(s) {
  if (!s) return null;
  const d = new Date(s);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function fmtExpiry(s) {
  if (!s) return null;
  const now = new Date();
  const exp = new Date(s);
  const diff = Math.ceil((exp - now) / 86400000);
  if (diff < 0) return { text: `Expired ${Math.abs(diff)}d ago`, cls: 'expiry-expired' };
  if (diff === 0) return { text: 'Expires today', cls: 'expiry-soon' };
  if (diff <= 3) return { text: `Expires in ${diff}d`, cls: 'expiry-soon' };
  if (diff <= 7) return { text: `${diff} days left`, cls: 'expiry-warn' };
  return { text: fmtDate(s), cls: 'expiry-ok' };
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function slotBar(running, max) {
  const pct = max > 0 ? Math.min((running/max)*100, 100) : 0;
  const col = pct > 80 ? 'var(--red)' : pct > 55 ? 'var(--amber)' : 'var(--violet)';
  return `<div style="display:flex;flex-direction:column;gap:3px;min-width:80px">
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:var(--mono)">
      <span>${running} on</span><span>${max > 0 ? max : '∞'}</span>
    </div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
  </div>`;
}

function planBadge(u) {
  if (!u.plan_name) return `<span class="pkg-none-badge">No Package</span>`;
  return `<div class="pkg-badge">
    <div class="pkg-badge-dot"></div>
    <div>
      <div class="pkg-badge-name">${escHtml(u.plan_name)}</div>
      <div class="pkg-badge-price">${u.price_bdt > 0 ? '৳'+u.price_bdt.toLocaleString()+'/mo' : u.price_per_month > 0 ? '$'+u.price_per_month+'/mo' : 'Free'}</div>
    </div>
  </div>`;
}

function expiryCell(u) {
  if (!u.plan_expires_at) {
    return u.plan_name ? `<span style="font-size:11px;color:var(--text3)">∞ Unlimited</span>` : `<span style="font-size:11px;color:var(--text3)">—</span>`;
  }
  const e = fmtExpiry(u.plan_expires_at);
  return `<span class="expiry-pill ${e.cls}">${e.text}</span>`;
}

async function loadUsers() {
  try {
    allUsers = await api('/api/users');
    renderUsers(allUsers);
    renderPkgSummary(allUsers);
  } catch(e) {
    document.getElementById('users-body').innerHTML = `<tr><td colspan="6" class="tbl-loading" style="color:var(--red)">Failed to load users</td></tr>`;
  }
}

function renderUsers(users) {
  const tbody = document.getElementById('users-body');
  if (!users.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="tbl-loading">No users found</td></tr>`;
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr data-name="${escHtml((u.username||'').toLowerCase())}" data-email="${escHtml((u.email||'').toLowerCase())}">
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="user-avatar" style="width:32px;height:32px;font-size:12px">${(u.username||'?')[0].toUpperCase()}</div>
          <div>
            <div style="font-size:13px;font-weight:500">${escHtml(u.username)}</div>
            <div style="font-size:11px;color:var(--text3)">${escHtml(u.email)}</div>
          </div>
        </div>
      </td>
      <td>${planBadge(u)}</td>
      <td>${expiryCell(u)}</td>
      <td>${slotBar(u.slots_running||0, u.max_slots||0)}</td>
      <td><span class="role-badge ${u.role}">${u.role}</span></td>
      <td>
        <button class="btn btn-icon btn-ghost" onclick='openEditUser(${JSON.stringify(u)})' title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        </button>
      </td>
    </tr>`).join('');
}

function renderPkgSummary(users) {
  const planCounts = {};
  users.forEach(u => {
    const key = u.plan_name || 'No Package';
    planCounts[key] = (planCounts[key]||0) + 1;
  });
  const total = users.length;
  document.getElementById('pkg-summary').innerHTML = Object.entries(planCounts).map(([name,count]) => {
    const pct = Math.round((count/total)*100);
    const isNone = name === 'No Package';
    return `<div class="pkg-stat-chip ${isNone?'pkg-stat-none':''}">
      <div class="pkg-stat-dot ${isNone?'none':''}"></div>
      <span class="pkg-stat-name">${escHtml(name)}</span>
      <span class="pkg-stat-count">${count}</span>
      <span class="pkg-stat-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function filterUsers() {
  const q = document.getElementById('user-search').value.toLowerCase();
  document.querySelectorAll('#users-body tr[data-name]').forEach(tr => {
    tr.style.display = (!q || tr.dataset.name.includes(q) || tr.dataset.email.includes(q)) ? '' : 'none';
  });
}

/* ── Modal helpers ─────────────────────────────────────── */
function clearExpiry() { document.getElementById('um-expires').value = ''; updateExpiryStatus(); }

function setExpiryDays(days) {
  const d = new Date(Date.now() + days * 86400000);
  const local = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  document.getElementById('um-expires').value = local;
  updateExpiryStatus();
}

function updateExpiryStatus() {
  const val = document.getElementById('um-expires').value;
  const el = document.getElementById('expiry-status');
  if (!val) { el.textContent = ''; return; }
  const e = fmtExpiry(val + ':00Z');
  el.innerHTML = `<span class="expiry-pill ${e.cls}">${e.text}</span>`;
}

document.getElementById('um-expires').addEventListener('change', updateExpiryStatus);

// When plan changes, auto-fill expiry from plan duration
document.getElementById('um-plan-picker').addEventListener('change', e => {
  const planId = e.target.value;
  if (!planId) { document.getElementById('expiry-auto-label').textContent = ''; return; }
  const plan = allPlans.find(p => p.id == planId);
  if (plan && plan.duration_days) {
    setExpiryDays(plan.duration_days);
    document.getElementById('expiry-auto-label').textContent = `(auto: ${plan.duration_days}d from ${plan.name})`;
  } else {
    document.getElementById('expiry-auto-label').textContent = '';
  }
});

function openEditUser(u) {
  editUserId = u.id;
  document.getElementById('um-avatar').textContent = (u.username||'?')[0].toUpperCase();
  document.getElementById('um-name').textContent = u.username;
  document.getElementById('um-email').textContent = u.email;
  document.getElementById('um-joined').textContent = 'Joined ' + (fmtDate(u.created_at) || '—');
  document.getElementById('um-srv-count').textContent = u.slots_used || 0;
  document.getElementById('expiry-auto-label').textContent = '';

  // Set expiry field
  const expiresEl = document.getElementById('um-expires');
  if (u.plan_expires_at) {
    const d = new Date(u.plan_expires_at);
    expiresEl.value = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  } else {
    expiresEl.value = '';
  }
  updateExpiryStatus();

  // Build package picker
  const picker = document.getElementById('um-plan-picker');
  const noPlanChecked = !u.plan_id;
  const opts = [`<label class="pkg-opt">
    <input type="radio" name="um-plan" value="" ${noPlanChecked?'checked':''}>
    <div class="pkg-opt-card no-plan">
      <div class="pkg-opt-name">No Package</div>
      <div class="pkg-opt-desc">No hosting plan assigned</div>
    </div>
  </label>`];
  allPlans.forEach(p => {
    const dur = p.duration_days ? `· ${p.duration_days}d` : '· Unlimited';
    const price = p.price_bdt > 0 ? `৳${p.price_bdt.toLocaleString()}/mo` : p.price_per_month > 0 ? `$${p.price_per_month}/mo` : 'Free';
    opts.push(`<label class="pkg-opt">
      <input type="radio" name="um-plan" value="${p.id}" ${u.plan_id==p.id?'checked':''}>
      <div class="pkg-opt-card">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div class="pkg-opt-name">${escHtml(p.name)}</div>
          <div class="pkg-opt-price">${price}</div>
        </div>
        <div class="pkg-opt-desc">${p.max_slots} slot${p.max_slots!==1?'s':''} · ${p.ram_mb>=1024?(p.ram_mb/1024).toFixed(1)+'GB':p.ram_mb+'MB'} RAM ${dur}</div>
      </div>
    </label>`);
  });
  picker.innerHTML = opts.join('');

  document.querySelector(`input[name="um-role"][value="${u.role}"]`).checked = true;
  document.getElementById('user-modal').classList.add('show');
}

function closeUserModal() { document.getElementById('user-modal').classList.remove('show'); }

async function saveUser() {
  const planVal = document.querySelector('input[name="um-plan"]:checked')?.value;
  const role = document.querySelector('input[name="um-role"]:checked')?.value;
  const expiresVal = document.getElementById('um-expires').value;
  const btn = document.getElementById('um-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    await api(`/api/users/${editUserId}`, {
      method: 'PUT',
      body: {
        planId: planVal ? +planVal : null,
        role,
        planExpiresAt: expiresVal ? new Date(expiresVal).toISOString() : null,
      }
    });
    toast('User updated');
    closeUserModal();
    loadUsers();
  } catch(e) { toast('Failed: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
}

document.getElementById('user-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeUserModal();
});

loadPlans().then(loadUsers);
</script>
{% endblock %}
